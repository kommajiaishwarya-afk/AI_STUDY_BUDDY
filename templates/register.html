<!DOCTYPE html>
<html>

<head>
<title>Register</title>
</head>


<body>

<h1>Create Account</h1>


<form method="POST" action="/register">


<input
type="text"
name="username"
placeholder="Username"
required>


<br><br>


<input
type="password"
name="password"
placeholder="Password"
required>


<br><br>


<button type="submit">
Register
</button>


</form>


<a href="/login">
Already have account? Login
</a>


</body>

</html>
