<!DOCTYPE html>
<html>

<head>

<title>AI Study Buddy</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    font-family:'Segoe UI',Arial;
}


.container{
    width:85%;
    margin:auto;
    padding:30px;
}


.header{

    display:flex;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px #0005;

}


.header h1{
    margin:0;
}


.logout{

    color:white;
    text-decoration:none;
    background:#ef4444;
    padding:10px 18px;
    border-radius:10px;

}



.card{

    margin-top:25px;
    background:#111827;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px #0007;

}



label{

    color:#60a5fa;
    font-weight:bold;

}


input,select{

    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:20px;
    border-radius:12px;
    border:none;
    background:#1f2937;
    color:white;
    font-size:16px;

}



button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    font-size:18px;
    cursor:pointer;

}


button:hover{

    transform:scale(1.02);

}



.result-title{

    margin-top:30px;
    color:#facc15;

}



pre{

    background:#020617;
    border-left:5px solid #38bdf8;
    padding:25px;
    border-radius:15px;
    white-space:pre-wrap;
    min-height:250px;
    color:#e2e8f0;
    font-size:16px;

}



.features{

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:20px;

}


.feature{

    background:#1e40af;
    padding:20px;
    border-radius:15px;
    text-align:center;

}


@media(max-width:700px){

.features{
grid-template-columns:1fr;
}

.container{
width:95%;
}

}


</style>


</head>


<body>


<div class="container">


<div class="header">


<div>

<h1>🤖 AI Study Buddy</h1>

<p>
Welcome, {{current_user.username}}
</p>

</div>


<a class="logout" href="/logout">
Logout
</a>


</div>



<div class="card">


<label>
Enter Topic
</label>


<input
id="topic"
placeholder="Example: Artificial Intelligence">


<label>
Choose AI Tool
</label>


<select id="action">


<option value="explain">
📘 Explain Topic
</option>


<option value="notes">
📝 Create Notes
</option>


<option value="summary">
⚡ Summary
</option>


<option value="quiz">
❓ Quiz Questions
</option>


<option value="flashcards">
🎴 Flashcards
</option>


<option value="mindmap">
🧠 Mind Map
</option>


</select>


<button onclick="generateAI()">
✨ Generate AI Content
</button>


</div>






</div>

</div>




<h2 class="result-title">
AI Result
</h2>



<pre id="result">
Your AI generated answer will appear here...
</pre>




</div>



<script>


async function generateAI(){


let topic =
document.getElementById("topic").value;


let action =
document.getElementById("action").value;



if(!topic){

alert("Enter topic");
return;

}



let form =
new FormData();


form.append("topic",topic);
form.append("action",action);



document.getElementById("result").innerText =
"⏳ AI is thinking...";



let response =
await fetch("/generate",{
method:"POST",
body:form
});



let data =
await response.json();



document.getElementById("result").innerText =
data.content || data.error;


}



</script>



</body>

</html>
